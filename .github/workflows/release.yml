name: Build and Release

on:
  push:
    branches: [ main ] # Чтобы проверять сборку при каждом пуше
    tags:
      - 'v*'      # Чтобы создавать релиз при пуше тега

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: "DEB;RPM"
          - os: macos-latest
            generator: "DragNDrop"
          - os: windows-latest
            generator: "WIX"

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Configure CMake
        # Используем -B build для чистоты
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release 

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        working-directory: build
        run: cpack -G "${{ matrix.generator }}"

      - name: Upload Release
        # Это сработает ТОЛЬКО если мы пушнули тег
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/*.deb
            build/*.rpm
            build/*.dmg
            build/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
